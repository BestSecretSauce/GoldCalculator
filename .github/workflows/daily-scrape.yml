name: Daily gold price scrape

on:
  schedule:
    # 09:00 Gulf Standard Time (UTC+4)
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python backend/scheduled_scrape.py

      - name: Commit and push updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/gold_prices_history.json
          git diff --staged --quiet || git commit -m "Daily gold price scrape $(date -u +%Y-%m-%d)"
          git push
